name: Release to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          version=$(ls dist/*.whl | sed -E 's/.*clean_fasta-([^-]+)-.*/\1/')
          tag="${GITHUB_REF_NAME#v}"
          echo "Built version: $version | release tag: $tag"
          if [ "$version" != "$tag" ]; then
            echo "::error::Release tag '$tag' does not match package version '$version'. Bump __version__ in src/clean_fasta/__init__.py."
            exit 1
          fi

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/clean-fasta
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
